function getRecords(key){
  try {
    return JSON.parse(localStorage.getItem(key) || '[]');
  } catch(e) {
    return [];
  }
}

function getAllRecords(){
  let all = [];
  Object.keys(projects).forEach(p => {
    getRecords(projects[p].key).forEach(r => all.push({...r, projectName: p}));
  });
  return all;
}

function collectProblems(record, projectKey){
  const problems = [];
  const maps = problemMaps[projectKey] || {};
  const seen = new Set();

  const replyCode = record.replyCode || record.reply || '';
  if(['7','8','9'].includes(replyCode) && maps.phoneError){
    const text = maps.phoneError[replyCode];
    if(text && !seen.has(text)){
      seen.add(text);
      problems.push({type:'phone', text: text});
    }
  }

  if(record.matchErrs && Array.isArray(record.matchErrs) && maps.match){
    record.matchErrs.forEach(err => {
      const text = maps.match[err];
      if(text && !seen.has(text)){
        seen.add(text);
        problems.push({type:'match', text: text});
      }
    });
  }

  if(record.sendResCode && maps.sendRes){
    const text = maps.sendRes[record.sendResCode];
    if(text && !seen.has(text)){
      seen.add(text);
      problems.push({type:'send', text: text});
    }
  }

  if(record.normErrs && Array.isArray(record.normErrs) && maps.norm){
    record.normErrs.forEach(err => {
      const text = maps.norm[err];
      if(text && !seen.has(text)){
        seen.add(text);
        problems.push({type:'norms', text: text});
      }
    });
  }

  if(projectKey === 'resident' && record.deathNotEnd && maps.deathNotEnd){
    const text = maps.deathNotEnd;
    if(text && !seen.has(text)){
      seen.add(text);
      problems.push({type:'norms', text: text});
    }
  }

  const examErrs = record.examErrs || record.errItems;
  if(examErrs && Array.isArray(examErrs) && maps.exam){
    examErrs.forEach(err => {
      const text = maps.exam[err];
      if(text && !seen.has(text)){
        seen.add(text);
        problems.push({type:'empty', text: text});
      }
    });
  }

  if(record.followErrs && Array.isArray(record.followErrs) && maps.follow){
    record.followErrs.forEach(err => {
      const text = maps.follow[err];
      if(text && !seen.has(text)){
        seen.add(text);
        problems.push({type:'empty', text: text});
      }
    });
  }

  const fakeVal = record.fake || record.fakeCode;
  if(fakeVal && fakeVal !== '0' && maps.fake){
    const text = maps.fake[fakeVal];
    if(text && !seen.has(text)){
      seen.add(text);
      problems.push({type:'error', text: text});
    }
  }

  if(record.remark && record.remark.trim()){
    const text = record.remark.trim();
    if(!seen.has(text)){
      seen.add(text);
      problems.push({type:'remark', text: text});
    }
  }

  return problems;
}

function loadYearOptions(){
  const years = new Set();
  getAllRecords().forEach(r => { if(r.year) years.add(String(r.year)); });
  const sorted = [...years].sort().reverse();
  const sel = document.getElementById('filterYear');
  sel.innerHTML = '<option value="">全部年度</option>';
  sorted.forEach(y => sel.innerHTML += '<option value="' + y + '">' + y + '</option>');
}

function generateReport(){
  const year = document.getElementById('filterYear').value;
  const quarter = document.getElementById('filterQuarter').value;

  const orgMap = {};

  Object.keys(projects).forEach(pName => {
    const records = getRecords(projects[pName].key);
    const filtered = records.filter(r => {
      if(year && String(r.year) !== year) return false;
      if(quarter && r.quarter !== quarter) return false;
      return true;
    });

    filtered.forEach(r => {
      const org = r.org || '未知单位';
      if(!orgMap[org]){
        orgMap[org] = {
          '居民': {}, '老年人': {}, '高血压': {}, '糖尿病': {}, '慢阻肺': {}
        };
      }
      const projectKey = pName === '居民' ? 'resident' : 
                         pName === '老年人' ? 'elderly' : 
                         pName === '高血压' ? 'hypertension' : 
                         pName === '糖尿病' ? 'diabetes' : 'copd';
      const problems = collectProblems(r, projectKey);
      problems.forEach(pb => {
        const text = pb.text;
        if(orgMap[org][pName][text]){
          orgMap[org][pName][text]++;
        } else {
          orgMap[org][pName][text] = 1;
        }
      });
    });
  });

  const container = document.getElementById('reportContent');
  const orgs = Object.keys(orgMap).sort();

  if(orgs.length === 0){
    container.innerHTML = '<div class="no-data">暂无数据</div>';
    return;
  }

  let html = '<table><thead><tr>';
  html += '<th style="width:150px;">单位</th>';
  ['居民','老年人','高血压','糖尿病','慢阻肺'].forEach(p => {
    html += '<th class="project-cell">' + p + '</th>';
  });
  html += '</tr></thead><tbody>';

  orgs.forEach(org => {
    html += '<tr>';
    html += '<td style="font-weight:500;">' + org + '</td>';

    ['居民','老年人','高血压','糖尿病','慢阻肺'].forEach(p => {
      const problemObj = orgMap[org][p] || {};
      const problems = Object.keys(problemObj);
      html += '<td class="problem-cell">';
      if(problems.length === 0){
        html += '<span class="empty-msg">无</span>';
      }else{
        problems.forEach(text => {
          const count = problemObj[text];
          let type = 'remark';
          if(text.includes('电话空号') || text.includes('电话错号') || text.includes('村医')) type = 'phone';
          else if(text.includes('发放体检结果') || text.includes('解读')) type = 'send';
          else if(text.includes('不规范')) type = 'norms';
          else if(text.includes('不符') || text.includes('造假') || text.includes('死亡')) type = 'match';
          else if(text.includes('空项') || text.includes('错项') || text.includes('未填写') || text.includes('未填')) type = 'empty';
          else type = 'remark';
          html += '<div class="item ' + type + '">' + text + (count > 1 ? ' <span class="count">(' + count + '次)</span>' : '') + '</div>';
        });
      }
      html += '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function exportExcel(){
  const year = document.getElementById('filterYear').value;
  const quarter = document.getElementById('filterQuarter').value;

  const orgMap = {};
  Object.keys(projects).forEach(pName => {
    const records = getRecords(projects[pName].key);
    const filtered = records.filter(r => {
      if(year && String(r.year) !== year) return false;
      if(quarter && r.quarter !== quarter) return false;
      return true;
    });
    filtered.forEach(r => {
      const org = r.org || '未知单位';
      if(!orgMap[org]){
        orgMap[org] = {
          '居民': {}, '老年人': {}, '高血压': {}, '糖尿病': {}, '慢阻肺': {}
        };
      }
      const projectKey = pName === '居民' ? 'resident' : 
                         pName === '老年人' ? 'elderly' : 
                         pName === '高血压' ? 'hypertension' : 
                         pName === '糖尿病' ? 'diabetes' : 'copd';
      const problems = collectProblems(r, projectKey);
      problems.forEach(pb => {
        const text = pb.text;
        if(orgMap[org][pName][text]){
          orgMap[org][pName][text]++;
        } else {
          orgMap[org][pName][text] = 1;
        }
      });
    });
  });

  const orgs = Object.keys(orgMap).sort();
  const data = [];
  data.push(['单位', '居民', '老年人', '高血压', '糖尿病', '慢阻肺']);

  orgs.forEach(org => {
    const row = [org];
    ['居民','老年人','高血压','糖尿病','慢阻肺'].forEach(p => {
      const problemObj = orgMap[org][p] || {};
      const problems = Object.keys(problemObj).map(text => {
        const count = problemObj[text];
        return text + (count > 1 ? '(' + count + '次)' : '');
      });
      row.push(problems.length > 0 ? problems.join('；') : '无');
    });
    data.push(row);
  });

  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '存在问题一览表');

  let fileName = '存在问题一览表';
  if(year) fileName += '_' + year;
  if(quarter) fileName += '_' + quarter;
  fileName += '.xlsx';

  XLSX.writeFile(wb, fileName);
}

  loadYearOptions();
  generateReport();
};
