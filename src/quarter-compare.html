<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>季度对比 - 健康核查后台</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;font-size:14px;}
body{padding:0;max-width:1600px;margin:0 auto;background:#f5f7fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Microsoft YaHei",sans-serif;}
.container{padding:20px;}
.header{background:linear-gradient(135deg,#2c3e50 0%,#34495e 100%);color:#fff;padding:20px 24px;border-radius:12px;margin-bottom:20px;box-shadow:0 4px 12px rgba(44,62,80,0.3);display:flex;justify-content:space-between;align-items:center;}
.header h1{margin:0;font-size:22px;}
.breadcrumb{font-size:13px;opacity:0.85;margin-top:6px;}
.breadcrumb a{color:#fff;text-decoration:none;margin:0 6px;}
.back-btn{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4);padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer;text-decoration:none;}
.back-btn:hover{background:rgba(255,255,255,0.35);}
.filter-bar{display:flex;gap:15px;flex-wrap:wrap;align-items:center;padding:15px;background:#fff;border-radius:8px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.filter-bar label{font-weight:500;color:#555;}
.filter-bar select{padding:8px 12px;border:1px solid #ddd;border-radius:6px;min-width:120px;}
.btn{padding:9px 20px;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;}
.btn-primary{background:#3498db;color:#fff;}
.btn-primary:hover{background:#2980b9;}
.btn-success{background:#27ae60;color:#fff;}
.btn-success:hover{background:#219a52;}
.section{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.section-title{font-size:15px;color:#333;margin-bottom:15px;font-weight:600;border-left:4px solid #3498db;padding-left:10px;}
/* 统计卡片 */
.stats-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:#f8fafc;padding:15px;border-radius:8px;text-align:center;}
.stat-card.highlight{background:#e8f5e9;border:2px solid #27ae60;}
.stat-card.warning{background:#fff3cd;border:2px solid #f39c12;}
.stat-card.danger{background:#ffebee;border:2px solid #e74c3c;}
.stat-card .value{font-size:24px;font-weight:700;color:#2c3e50;}
.stat-card.highlight .value{color:#27ae60;}
.stat-card.warning .value{color:#f39c12;}
.stat-card.danger .value{color:#e74c3c;}
.stat-card .label{font-size:12px;color:#666;margin-top:4px;}
/* 柱状图 */
.bar-chart{display:flex;align-items:flex-end;gap:20px;height:280px;padding:30px 20px 10px;background:#f8fafc;border-radius:8px;}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;min-width:100px;}
.bar-wrapper{display:flex;align-items:flex-end;gap:4px;height:200px;}
.bar{width:40px;border-radius:4px 4px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:4px;color:#fff;font-size:11px;font-weight:600;min-height:5px;}
.bar-label{font-size:13px;color:#666;margin-top:8px;text-align:center;font-weight:500;}
.bar-sub{font-size:11px;color:#999;}
/* 折线图 */
.line-chart{background:#f8fafc;border-radius:8px;padding:20px;overflow-x:auto;}
.line-container{display:flex;align-items:flex-end;gap:30px;height:200px;padding:0 20px;min-width:500px;}
.line-point{display:flex;flex-direction:column;align-items:center;min-width:80px;}
.line-dot{width:12px;height:12px;border-radius:50%;background:#3498db;border:3px solid #fff;box-shadow:0 0 0 2px #3498db;cursor:pointer;position:relative;}
.line-dot::after{content:attr(data-value);position:absolute;top:-25px;left:50%;transform:translateX(-50%);background:#2c3e50;color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;white-space:nowrap;opacity:0;transition:opacity 0.2s;}
.line-dot:hover::after{opacity:1;}
.line-connector{height:2px;background:#3498db;flex:1;margin-bottom:6px;}
.line-label{font-size:12px;color:#666;margin-top:8px;text-align:center;}
/* 表格 */
.table-container{overflow-x:auto;}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px;}
th,td{border:1px solid #ddd;padding:10px 8px;text-align:center;}
th{background:#f8fafc;font-weight:600;color:#333;position:sticky;top:0;}
td.left{text-align:left;}
tr:hover{background:#f8f9fa;}
tr.subtotal{background:#fff;}
tr.total-row{background:#eef6ff;font-weight:600;}
.trend-up{color:#27ae60;font-weight:600;}
.trend-down{color:#e74c3c;font-weight:600;}
.trend-keep{color:#999;}
.empty-tip{padding:30px;text-align:center;color:#999;}
/* 颜色标签 */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;}
.badge-green{background:#e8f5e9;color:#27ae60;}
.badge-red{background:#ffebee;color:#e74c3c;}
.badge-blue{background:#e3f2fd;color:#1976d2;}
.badge-orange{background:#fff3e0;color:#e65100}
/* 项目标签 */
.project-tabs{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;}
.project-tab{padding:8px 16px;background:#f0f0f0;border-radius:20px;cursor:pointer;font-size:13px;transition:all 0.2s;}
.project-tab:hover{background:#e0e0e0;}
.project-tab.active{background:#3498db;color:#fff;}
/* 对比分析 */
.analysis-box{background:#fff;padding:20px;border-radius:8px;border-left:4px solid #3498db;margin-top:15px;}
.analysis-box h4{margin:0 0 10px 0;color:#2c3e50;font-size:14px;}
.analysis-box p{margin:5px 0;font-size:13px;line-height:1.6;color:#555;}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div>
    <h1>📈 季度对比分析</h1>
    <div class="breadcrumb"><a href="admin.html">后台首页</a> / 季度对比</div>
  </div>
  <a href="admin.html" class="back-btn">返回后台</a>
</div>

<div class="filter-bar">
  <label>年度：</label>
  <select id="quarterYear"><option value="">选择年度</option></select>
  <label>项目：</label>
  <select id="quarterProject">
    <option value="">全部项目</option>
    <option value="居民">居民</option>
    <option value="老年人">老年人</option>
    <option value="高血压">高血压</option>
    <option value="糖尿病">糖尿病</option>
    <option value="慢阻肺">慢阻肺</option>
  </select>
  <button class="btn btn-primary" onclick="generateCompare()">生成对比</button>
  <button class="btn btn-success" onclick="exportCompare()">导出Excel</button>
</div>

<!-- 总体统计卡片 -->
<div class="stats-cards" id="statsCards" style="display:none;">
  <div class="stat-card"><div class="value" id="totalCount">0</div><div class="label">总核查数</div></div>
  <div class="stat-card highlight"><div class="value" id="validRate">0%</div><div class="label">有效应答率</div></div>
  <div class="stat-card warning"><div class="value" id="lostRate">0%</div><div class="label">失访率</div></div>
  <div class="stat-card warning"><div class="value" id="telRate">0%</div><div class="label">电话异常率</div></div>
  <div class="stat-card highlight"><div class="value" id="matchRate">0%</div><div class="label">符合率</div></div>
  <div class="stat-card highlight"><div class="value" id="standardRate">0%</div><div class="label">规范率</div></div>
</div>

<!-- 图表区域 -->
<div class="section" id="chartSection" style="display:none;">
  <div class="section-title">各季度核查数量与指标趋势</div>
  <div class="project-tabs" id="projectTabs"></div>
  <div style="margin-bottom:20px;">
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:10px;">
      <label><input type="checkbox" id="showTotal" checked onchange="renderChart()"> 核查数量</label>
      <label><input type="checkbox" id="showValidRate" checked onchange="renderChart()"> 有效应答率</label>
      <label><input type="checkbox" id="showMatchRate" checked onchange="renderChart()"> 符合率</label>
      <label><input type="checkbox" id="showStandardRate" checked onchange="renderChart()"> 规范率</label>
    </div>
  </div>
  <div class="bar-chart" id="barChart"></div>
  <div class="line-chart" id="lineChart" style="margin-top:15px;"></div>
</div>

<!-- 对比分析 -->
<div class="analysis-box" id="analysisBox" style="display:none;">
  <h4>📊 季度对比分析</h4>
  <div id="analysisContent"></div>
</div>

<!-- 详细数据表 -->
<div class="section" id="tableSection" style="display:none;">
  <div class="section-title">各项目各季度详细数据</div>
  <div class="table-container">
    <table id="detailTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

</div>

<script>
const projects = {
  '居民': { key: 'residentCheckRecords', hasControl: false },
  '老年人': { key: 'elderlyCheckRecords', hasControl: false },
  '高血压': { key: 'hypertensionCheckRecords', hasControl: true },
  '糖尿病': { key: 'diabetesCheckRecords', hasControl: true },
  '慢阻肺': { key: 'copdCheckRecords', hasControl: false }
};

let currentData = {};
let selectedProject = '';

function getRecords(project){
  try {
    return JSON.parse(localStorage.getItem(projects[project].key) || '[]');
  } catch(e) { return []; }
}

function formatQuarter(q){
  const map = {Q1:'一季度',Q2:'二季度',Q3:'三季度',Q4:'四季度'};
  return map[q] || q || '';
}

function loadYearOptions(){
  const years = new Set();
  Object.keys(projects).forEach(p => {
    getRecords(p).forEach(r => { if(r.year) years.add(String(r.year)); });
  });
  const sorted = [...years].sort().reverse();
  const sel = document.getElementById('quarterYear');
  sel.innerHTML = '<option value="">选择年度</option>';
  sorted.forEach(y => sel.innerHTML += '<option value="' + y + '">' + y + '</option>');
}

function calcStats(records, projectName){
  const stats = {
    total: records.length,
    valid: 0, invalid: 0, lost: 0, telError: 0,
    match: 0, unmatch: 0,
    standard: 0, unstandard: 0,
    controlOk: 0
  };

  records.forEach(r => {
    const reply = r.replyCode || r.reply || '';
    if(reply === '1' || reply === '2'){
      stats.valid++;
      const matchResult = r.matchResult || r.judgeMatch || '';
      const fake = r.fake || r.fakeCode || '0';
      const isUnmatch = matchResult.includes('不符合') || fake !== '0';

      if(isUnmatch){
        stats.unmatch++;
        stats.unstandard++;
      } else {
        stats.match++;
        const normResult = r.normResult || r.judgeNorm || '';
        if(normResult.includes('不规范')){
          stats.unstandard++;
        } else {
          stats.standard++;
        }
      }

      if(projects[projectName].hasControl){
        const control = r.controlSatisfied || r.judgeControl || '';
        if(control === '满意') stats.controlOk++;
      }
    } else {
      stats.invalid++;
      if(['3','4','5','6'].includes(reply)) stats.lost++;
      else if(['7','8','9'].includes(reply)) stats.telError++;
    }
  });

  stats.validRate = stats.total > 0 ? (stats.valid / stats.total * 100) : 0;
  stats.lostRate = stats.total > 0 ? (stats.lost / stats.total * 100) : 0;
  stats.telRate = stats.total > 0 ? (stats.telError / stats.total * 100) : 0;
  stats.matchRate = stats.valid > 0 ? (stats.match / stats.valid * 100) : 0;
  stats.standardRate = stats.valid > 0 ? (stats.standard / stats.valid * 100) : 0;
  stats.controlRate = stats.valid > 0 ? (stats.controlOk / stats.valid * 100) : 0;

  return stats;
}

function generateCompare(){
  const year = document.getElementById('quarterYear').value;
  const project = document.getElementById('quarterProject').value;
  if(!year){ alert('请选择年度'); return; }

  currentData = {};
  const quarters = ['Q1','Q2','Q3','Q4'];

  if(project){
    selectedProject = project;
    let records = getRecords(project).filter(r => String(r.year) === year);
    currentData[project] = {};
    quarters.forEach(q => {
      const recs = records.filter(r => r.quarter === q);
      currentData[project][q] = calcStats(recs, project);
    });
  } else {
    selectedProject = '全部';
    Object.keys(projects).forEach(p => {
      let records = getRecords(p).filter(r => String(r.year) === year);
      currentData[p] = {};
      quarters.forEach(q => {
        const recs = records.filter(r => r.quarter === q);
        currentData[p][q] = calcStats(recs, p);
      });
    });
  }

  renderStats();
  renderProjectTabs();
  renderChart();
  renderTable();
  renderAnalysis();
  
  document.getElementById('statsCards').style.display = 'grid';
  document.getElementById('chartSection').style.display = 'block';
  document.getElementById('tableSection').style.display = 'block';
  document.getElementById('analysisBox').style.display = 'block';
}

function renderStats(){
  const quarters = ['Q1','Q2','Q3','Q4'];
  let totals = {total:0, valid:0, lost:0, telError:0, match:0, standard:0};
  
  Object.keys(currentData).forEach(p => {
    quarters.forEach(q => {
      totals.total += currentData[p][q].total;
      totals.valid += currentData[p][q].valid;
      totals.lost += currentData[p][q].lost;
      totals.telError += currentData[p][q].telError;
      totals.match += currentData[p][q].match;
      totals.standard += currentData[p][q].standard;
    });
  });

  document.getElementById('totalCount').textContent = totals.total;
  document.getElementById('validRate').textContent = totals.total > 0 ? (totals.valid/totals.total*100).toFixed(1) + '%' : '0%';
  document.getElementById('lostRate').textContent = totals.total > 0 ? (totals.lost/totals.total*100).toFixed(1) + '%' : '0%';
  document.getElementById('telRate').textContent = totals.total > 0 ? (totals.telError/totals.total*100).toFixed(1) + '%' : '0%';
  document.getElementById('matchRate').textContent = totals.valid > 0 ? (totals.match/totals.valid*100).toFixed(1) + '%' : '0%';
  document.getElementById('standardRate').textContent = totals.valid > 0 ? (totals.standard/totals.valid*100).toFixed(1) + '%' : '0%';
}

function renderProjectTabs(){
  const tabs = document.getElementById('projectTabs');
  let html = '<div class="project-tab' + (selectedProject === '全部' ? ' active' : '') + '" onclick="switchProject(\'\')">全部项目</div>';
  Object.keys(projects).forEach(p => {
    html += '<div class="project-tab' + (selectedProject === p ? ' active' : '') + '" onclick="switchProject(\'' + p + '\')">' + p + '</div>';
  });
  tabs.innerHTML = html;
}

function switchProject(p){
  selectedProject = p;
  renderProjectTabs();
  renderChart();
  renderTable();
  renderAnalysis();
}

function renderChart(){
  const chart = document.getElementById('barChart');
  const line = document.getElementById('lineChart');
  const quarters = ['Q1','Q2','Q3','Q4'];
  
  const showTotal = document.getElementById('showTotal').checked;
  const showValidRate = document.getElementById('showValidRate').checked;
  const showMatchRate = document.getElementById('showMatchRate').checked;
  const showStandardRate = document.getElementById('showStandardRate').checked;

  // 获取当前项目数据
  let data = currentData;
  if(selectedProject && selectedProject !== '全部' && data[selectedProject]){
    data = {};
    data[selectedProject] = currentData[selectedProject];
  }

  // 计算每个季度的合计
  const quarterTotals = {};
  quarters.forEach(q => {
    quarterTotals[q] = {total:0, validRate:0, matchRate:0, standardRate:0};
    let validSum = 0, matchSum = 0, standardSum = 0;
    Object.keys(data).forEach(p => {
      quarterTotals[q].total += data[p][q].total;
      validSum += data[p][q].valid;
      matchSum += data[p][q].match;
      standardSum += data[p][q].standard;
    });
    if(quarterTotals[q].total > 0){
      quarterTotals[q].validRate = validSum / quarterTotals[q].total * 100;
      quarterTotals[q].matchRate = validSum > 0 ? matchSum / validSum * 100 : 0;
      quarterTotals[q].standardRate = validSum > 0 ? standardSum / validSum * 100 : 0;
    }
  });

  // 渲染柱状图
  const max = Math.max(...Object.values(quarterTotals).map(d => d.total), 1);
  let barHtml = '';
  quarters.forEach(q => {
    const d = quarterTotals[q];
    barHtml += '<div class="bar-group">';
    barHtml += '<div class="bar-wrapper">';
    if(showTotal){
      barHtml += '<div class="bar" style="height:' + (d.total/max*180) + 'px;background:#3498db;">' + (d.total > 0 ? d.total : '') + '</div>';
    }
    if(showValidRate){
      barHtml += '<div class="bar" style="height:' + (d.validRate/100*180) + 'px;background:#27ae60;">' + (d.validRate > 0 ? d.validRate.toFixed(0) + '%' : '') + '</div>';
    }
    if(showMatchRate){
      barHtml += '<div class="bar" style="height:' + (d.matchRate/100*180) + 'px;background:#e67e22;">' + (d.matchRate > 0 ? d.matchRate.toFixed(0) + '%' : '') + '</div>';
    }
    if(showStandardRate){
      barHtml += '<div class="bar" style="height:' + (d.standardRate/100*180) + 'px;background:#9b59b6;">' + (d.standardRate > 0 ? d.standardRate.toFixed(0) + '%' : '') + '</div>';
    }
    barHtml += '</div>';
    barHtml += '<div class="bar-label">' + formatQuarter(q) + '<div class="bar-sub">' + d.total + '人</div></div>';
    barHtml += '</div>';
  });
  chart.innerHTML = barHtml;

  // 渲染图例
  chart.innerHTML += '<div style="display:flex;gap:15px;justify-content:center;margin-top:10px;font-size:12px;">' +
    (showTotal ? '<span><span style="display:inline-block;width:20px;height:12px;background:#3498db;margin-right:4px;vertical-align:middle;"></span>核查数量</span>' : '') +
    (showValidRate ? '<span><span style="display:inline-block;width:20px;height:12px;background:#27ae60;margin-right:4px;vertical-align:middle;"></span>有效应答率</span>' : '') +
    (showMatchRate ? '<span><span style="display:inline-block;width:20px;height:12px;background:#e67e22;margin-right:4px;vertical-align:middle;"></span>符合率</span>' : '') +
    (showStandardRate ? '<span><span style="display:inline-block;width:20px;height:12px;background:#9b59b6;margin-right:4px;vertical-align:middle;"></span>规范率</span>' : '') +
    '</div>';

  // 渲染折线图
  let lineHtml = '<div style="display:flex;align-items:flex-end;gap:15px;height:180px;padding:0 20px;">';
  quarters.forEach((q, i) => {
    const d = quarterTotals[q];
    lineHtml += '<div class="line-point">';
    if(showValidRate){
      lineHtml += '<div class="line-dot" style="background:#27ae60;box-shadow:0 0 0 2px #27ae60;" data-value="有效应答率:' + d.validRate.toFixed(1) + '%"></div>';
    }
    if(showMatchRate){
      lineHtml += '<div class="line-dot" style="background:#e67e22;box-shadow:0 0 0 2px #e67e22;" data-value="符合率:' + d.matchRate.toFixed(1) + '%"></div>';
    }
    if(showStandardRate){
      lineHtml += '<div class="line-dot" style="background:#9b59b6;box-shadow:0 0 0 2px #9b59b6;" data-value="规范率:' + d.standardRate.toFixed(1) + '%"></div>';
    }
    lineHtml += '<div class="line-label">' + formatQuarter(q) + '</div>';
    if(i < 3) lineHtml += '<div class="line-connector"></div>';
    lineHtml += '</div>';
  });
  lineHtml += '</div>';
  line.innerHTML = lineHtml;
}

function renderTable(){
  const thead = document.getElementById('tableHead');
  const tbody = document.getElementById('tableBody');
  const quarters = ['Q1','Q2','Q3','Q4'];
  const hasControl = selectedProject && selectedProject !== '全部' && projects[selectedProject].hasControl;

  // 表头
  let headerHtml = '<tr>';
  headerHtml += '<th rowspan="2">项目</th>';
  quarters.forEach(q => {
    headerHtml += '<th colspan="' + (hasControl ? 9 : 8) + '">' + formatQuarter(q) + '</th>';
  });
  headerHtml += '<th rowspan="2">环比趋势</th></tr><tr>';
  const cols = ['核查数','有效数','有效率','失访数','失访率','电话异常','电话异常率','符合数','符合率','规范数','规范率'];
  const colsMap = hasControl ? cols : cols.filter(c => c !== '控制率');
  colsMap.forEach(c => headerHtml += '<th>' + c + '</th>');
  headerHtml += '</tr>';
  thead.innerHTML = headerHtml;

  // 表格数据
  let bodyHtml = '';
  const displayProjects = selectedProject && selectedProject !== '全部' ? [selectedProject] : Object.keys(projects);
  
  displayProjects.forEach(p => {
    bodyHtml += '<tr><td style="text-align:left;font-weight:500;">' + p + '</td>';
    let prevValidRate = 0, prevStandardRate = 0;
    quarters.forEach((q, i) => {
      const d = currentData[p][q];
      bodyHtml += '<td>' + d.total + '</td>';
      bodyHtml += '<td>' + d.valid + '</td>';
      bodyHtml += '<td>' + (d.total > 0 ? d.validRate.toFixed(1) + '%' : '-') + '</td>';
      bodyHtml += '<td>' + d.lost + '</td>';
      bodyHtml += '<td>' + (d.total > 0 ? d.lostRate.toFixed(1) + '%' : '-') + '</td>';
      bodyHtml += '<td>' + d.telError + '</td>';
      bodyHtml += '<td>' + (d.total > 0 ? d.telRate.toFixed(1) + '%' : '-') + '</td>';
      bodyHtml += '<td>' + d.match + '</td>';
      bodyHtml += '<td>' + (d.valid > 0 ? d.matchRate.toFixed(1) + '%' : '-') + '</td>';
      if(hasControl){
        bodyHtml += '<td>' + d.standard + '</td>';
        bodyHtml += '<td>' + (d.valid > 0 ? d.controlRate.toFixed(1) + '%' : '-') + '</td>';
        bodyHtml += '<td>' + (d.valid > 0 ? d.standardRate.toFixed(1) + '%' : '-') + '</td>';
      } else {
        bodyHtml += '<td>' + d.standard + '</td>';
        bodyHtml += '<td>' + (d.valid > 0 ? d.standardRate.toFixed(1) + '%' : '-') + '</td>';
      }
      if(i === 0){
        prevValidRate = d.validRate;
        prevStandardRate = d.standardRate;
      }
    });
    // 趋势
    const lastQ = quarters[3];
    const currValidRate = currentData[p][lastQ].validRate;
    const currStandardRate = currentData[p][lastQ].standardRate;
    let trend = '';
    if(currValidRate > prevValidRate) trend += '<span class="trend-up">有效应答率↑</span> ';
    else if(currValidRate < prevValidRate) trend += '<span class="trend-down">有效应答率↓</span> ';
    if(currStandardRate > prevStandardRate) trend += '<span class="trend-up">规范率↑</span>';
    else if(currStandardRate < prevStandardRate) trend += '<span class="trend-down">规范率↓</span>';
    bodyHtml += '<td>' + (trend || '<span class="trend-keep">-</span>') + '</td></tr>';
  });

  // 合计行
  let totalRow = '<tr class="total-row"><td style="text-align:left;">合计</td>';
  quarters.forEach(q => {
    let total = {total:0, valid:0, lost:0, telError:0, match:0, standard:0};
    Object.keys(currentData).forEach(p => {
      total.total += currentData[p][q].total;
      total.valid += currentData[p][q].valid;
      total.lost += currentData[p][q].lost;
      total.telError += currentData[p][q].telError;
      total.match += currentData[p][q].match;
      total.standard += currentData[p][q].standard;
    });
    const validRate = total.total > 0 ? total.valid / total.total * 100 : 0;
    const matchRate = total.valid > 0 ? total.match / total.valid * 100 : 0;
    const standardRate = total.valid > 0 ? total.standard / total.valid * 100 : 0;

    totalRow += '<td>' + total.total + '</td>';
    totalRow += '<td>' + total.valid + '</td>';
    totalRow += '<td>' + (total.total > 0 ? validRate.toFixed(1) + '%' : '-') + '</td>';
    totalRow += '<td>' + total.lost + '</td>';
    totalRow += '<td>' + (total.total > 0 ? (total.lost/total.total*100).toFixed(1) + '%' : '-') + '</td>';
    totalRow += '<td>' + total.telError + '</td>';
    totalRow += '<td>' + (total.total > 0 ? (total.telError/total.total*100).toFixed(1) + '%' : '-') + '</td>';
    totalRow += '<td>' + total.match + '</td>';
    totalRow += '<td>' + (total.valid > 0 ? matchRate.toFixed(1) + '%' : '-') + '</td>';
    totalRow += '<td>' + total.standard + '</td>';
    totalRow += '<td>' + (total.valid > 0 ? standardRate.toFixed(1) + '%' : '-') + '</td>';
  });
  totalRow += '<td>-</td></tr>';
  tbody.innerHTML = bodyHtml + totalRow;
}

function renderAnalysis(){
  const content = document.getElementById('analysisContent');
  const quarters = ['Q1','Q2','Q3','Q4'];
  
  let analysis = [];

  Object.keys(currentData).forEach(p => {
    const rates = quarters.map(q => ({
      validRate: currentData[p][q].validRate,
      matchRate: currentData[p][q].matchRate,
      standardRate: currentData[p][q].standardRate
    }));

    const lastQ = rates[3];
    const firstQ = rates[0];

    let text = '<strong>' + p + '：</strong> ';
    let issues = [];

    if(lastQ.validRate > firstQ.validRate + 5){
      issues.push('有效应答率从' + firstQ.validRate.toFixed(1) + '%提升至' + lastQ.validRate.toFixed(1) + '%');
    } else if(lastQ.validRate < firstQ.validRate - 5){
      issues.push('有效应答率从' + firstQ.validRate.toFixed(1) + '%下降至' + lastQ.validRate.toFixed(1) + '%');
    }

    if(lastQ.matchRate > firstQ.matchRate + 5){
      issues.push('符合率从' + firstQ.matchRate.toFixed(1) + '%提升至' + lastQ.matchRate.toFixed(1) + '%');
    } else if(lastQ.matchRate < firstQ.matchRate - 5){
      issues.push('符合率从' + firstQ.matchRate.toFixed(1) + '%下降至' + lastQ.matchRate.toFixed(1) + '%');
    }

    if(lastQ.standardRate > firstQ.standardRate + 5){
      issues.push('规范率从' + firstQ.standardRate.toFixed(1) + '%提升至' + lastQ.standardRate.toFixed(1) + '%');
    } else if(lastQ.standardRate < firstQ.standardRate - 5){
      issues.push('规范率从' + firstQ.standardRate.toFixed(1) + '%下降至' + lastQ.standardRate.toFixed(1) + '%');
    }

    if(issues.length > 0){
      analysis.push(text + issues.join('，') + '。');
    } else {
      analysis.push('<strong>' + p + '：</strong> 各指标相对稳定。');
    }
  });

  content.innerHTML = analysis.length > 0 ? '<p>' + analysis.join('</p><p>') + '</p>' : '<p>暂无明显趋势变化。</p>';
}

function exportCompare(){
  if(Object.keys(currentData).length === 0){ alert('请先生成对比'); return; }
  
  const quarters = ['Q1','Q2','Q3','Q4'];
  const data = [];
  data.push(['项目', '季度', '核查数', '有效数', '有效应答率', '失访数', '失访率', '电话异常', '电话异常率', '符合数', '符合率', '规范数', '规范率', '控制率']);

  Object.keys(currentData).forEach(p => {
    quarters.forEach(q => {
      const d = currentData[p][q];
      data.push([
        p, formatQuarter(q), d.total, d.valid,
        d.total > 0 ? d.validRate.toFixed(2) + '%' : '0%',
        d.lost, d.total > 0 ? d.lostRate.toFixed(2) + '%' : '0%',
        d.telError, d.total > 0 ? d.telRate.toFixed(2) + '%' : '0%',
        d.match, d.valid > 0 ? d.matchRate.toFixed(2) + '%' : '0%',
        d.standard, d.valid > 0 ? d.standardRate.toFixed(2) + '%' : '0%',
        projects[p].hasControl && d.valid > 0 ? d.controlRate.toFixed(2) + '%' : '-'
      ]);
    });
  });

  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '季度对比');
  
  const year = document.getElementById('quarterYear').value;
  XLSX.writeFile(wb, year + '年季度对比_' + new Date().toLocaleDateString().replace(/\//g,'-') + '.xlsx');
}
